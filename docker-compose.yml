version: '3.8'

services:
  api:
    build: .
    container_name: olist-api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
      - DB_NAME=olist_portfolio
      - DB_USER=postgres
      - DB_PASSWORD=123
      - SCHEMA_NAME=portfolio
    extra_hosts:
      - "host.docker.internal:host-gateway"
